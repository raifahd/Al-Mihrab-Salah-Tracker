                        "primary-fixed": "#ffe088",
                        "on-primary-fixed-variant": "#574500",
                        "on-secondary-fixed-variant": "#00468c",
                        "background": "#0f131f",
                        "surface-container-high": "#262a37",
                        "on-secondary-fixed": "#001b3d",

                        "headline": ["Noto Serif"],

<style>
        body {
            background-color: #0f131f;
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
        }
        .celestial-bg {
            background-image: radial-gradient(circle at 50% 0%, #1b1f2c 0%, #0f131f 70%);
        }
        .geometric-pattern {
            mask-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l5.878 18.09h19.022l-15.39 11.18 5.878 18.09L30 36.18l-15.39 11.18 5.878-18.09L5.1 18.09h19.022L30 0z' fill='%23ffffff' fill-opacity='1'/%3E%3C/svg%3E");
            mask-size: 80px;
            opacity: 0.03;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface antialiased">
<!-- Suppression of Nav Shells per "The Destination Rule" for Login Screen -->
<main class="relative min-h-screen flex items-center justify-center celestial-bg px-6">
<!-- Background Texture -->
<div class="absolute inset-0 geometric-pattern pointer-events-none"></div>
<!-- Atmospheric Glow -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary-container/5 rounded-full blur-[100px]"></div>
<section class="w-full max-w-md z-10">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-12">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-6 shadow-xl">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">mosque</span>
</div>
<h1 class="font-headline text-4xl font-bold text-primary tracking-tight">Al-Mihrab: Salah Tracker</h1>
</div>
<!-- Login Card -->
<div class="bg-surface-container p-8 md:p-10 rounded-xl shadow-2xl relative overflow-hidden border border-outline-variant/10">
<div class="relative z-10">
<header class="mb-8">
<h2 class="font-headline text-2xl text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Please enter your details to find your peace.</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1">Email/Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl">person</span>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary/30 transition-all" placeholder="yourname@domain.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant">Password</label>
<a class="text-xs text-primary hover:text-tertiary transition-colors font-medium" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary/30 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-gradient-to-br from-primary to-on-primary-container text-on-primary font-bold py-4 rounded-xl shadow-[0_8px_24px_rgba(233,195,73,0.2)] hover:shadow-[0_12px_32px_rgba(233,195,73,0.3)] transform hover:-translate-y-0.5 transition-all active:scale-[0.98]">
                            Log In
                        </button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="mx-4 text-xs text-outline/40 uppercase tracking-widest">or continue with</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high py-3 rounded-xl border border-outline-variant/10 transition-colors">
<img alt="Google Logo" class="w-5 h-5 opacity-80" data-alt="minimalist google logo icon with clean transparent background for ui login integration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDudmZRwRg6ETXNCbn_etY4zP6SvgD9N0820302ppDxEtZjdmU1u7n4O6HpJRtogfvUOTfoalfYopjSevDIdX7zUpf8AhJ65rWMRvApdiiNgWjJ5ESLDADw3qCHo6aDZFz9BP1caNHQtOEJxHQlXDiKnLLFm-Xt5UALVEHGpAhpwfaXKopIkCwv7hqAyGG0bpqwcJMlggjrmNzQSi2SV6b-9JEOGGoPAZgBkGVRr99GIaw1NZO8wro1KVw6KOKvLBOv7RWjp-SI_fHo"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high py-3 rounded-xl border border-outline-variant/10 transition-colors">
<span class="material-symbols-outlined text-on-surface text-xl">ios</span>
<span class="text-sm font-medium">Apple</span>
</button>
</div>
</div>
<!-- Subtle Decorative Element -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 opacity-[0.03]">
<span class="material-symbols-outlined text-[120px] text-primary">auto_awesome</span>
</div>
</div>
<!-- Sign Up Prompt -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold ml-1 hover:underline decoration-primary/30 underline-offset-4" href="#">Sign Up</a>
</p>
</div>
</section>
<!-- Decorative Floating Image - "The Overlap" Rule -->
<div class="hidden lg:block absolute bottom-0 left-0 w-1/4 opacity-20 pointer-events-none">
<img alt="Islamic Architecture silhouette" class="mask-image-gradient" data-alt="silhouetted dome and minaret of a mosque against a deep twilight sky with a crescent moon and first stars" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXZbVIk4xx-3F9XGVRbaaDtEBU8xgK-HCW7gtXVDCXiq7CXFlhS_UX-AOmrWUOOk_jehPFfTmK3n9S_oMaPTyChZwW4hmte08QKYqFQ-QnxjR8VPxsxVEb86dCXSt6RLGO5MxgmnLQqoD8XrBCjOyB2z2kUSrpAaSb2_TBYBhpPtnIQc_TKiFv09G0VAUaP4DnMYcwHnWvRHp6dggrlNswCaQBpbimF3mnFFFiS6HJ2jFKouTyYJclOM-3b2pLepAq4n4jz_OFccwK"/>
</div>
</main>
<style>
        /* Signature Layout Gradient Mask */
        .mask-image-gradient {
            mask-image: linear-gradient(to top, transparent 0%, black 100%);
            -webkit-mask-image: linear-gradient(to top, transparent 0%, black 100%);
        }
    </style>
</body></html>
